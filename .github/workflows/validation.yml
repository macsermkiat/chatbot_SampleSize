name: Validation Suite

on:
  pull_request:
    paths:
      - 'backend/app/agents/**'
      - 'evaluation/**'
  push:
    branches: [main]
    paths:
      - 'backend/app/agents/**'
      - 'evaluation/**'

jobs:
  validation-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run backend tests
        run: uv run pytest tests/ -v --tb=short

      - name: Run evaluation validation tests
        run: uv run pytest ../evaluation/tests/test_validation_benchmarks.py -v --tb=short

      - name: Run evaluation unit tests
        run: uv run pytest ../evaluation/tests/ -v --tb=short
